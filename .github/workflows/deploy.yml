name: Deploy to Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --omit=dev
      - run: npm run build

      - name: Create deployment package
        run: |
          zip -r lambda-deployment.zip dist/ node_modules/ package.json

      # NOTE: Actual AWS deployment step requires AWS credentials configuration.
      # Add the following secrets to your GitHub repository settings:
      #   - AWS_ACCESS_KEY_ID
      #   - AWS_SECRET_ACCESS_KEY
      #   - AWS_REGION
      # Then uncomment the AWS CLI deploy step below.
      #
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      #
      # - name: Deploy to Lambda
      #   run: |
      #     aws lambda update-function-code --function-name fetch-news --zip-file fileb://lambda-deployment.zip
      #     aws lambda update-function-code --function-name fetch-price --zip-file fileb://lambda-deployment.zip
      #     aws lambda update-function-code --function-name execute-trade --zip-file fileb://lambda-deployment.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment
          path: lambda-deployment.zip
          retention-days: 5
