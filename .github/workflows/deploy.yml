name: Deploy to Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm prune --omit=dev

      - name: Create deployment package
        run: |
          zip -r lambda-deployment.zip dist/ node_modules/ package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code --function-name algo-trade-fetch-news-prod --zip-file fileb://lambda-deployment.zip
          aws lambda update-function-code --function-name algo-trade-fetch-price-prod --zip-file fileb://lambda-deployment.zip
          aws lambda update-function-code --function-name algo-trade-analyze-prod --zip-file fileb://lambda-deployment.zip
          aws lambda update-function-code --function-name algo-trade-trade-crypto-prod --zip-file fileb://lambda-deployment.zip
          aws lambda update-function-code --function-name algo-trade-trade-jp-prod --zip-file fileb://lambda-deployment.zip
          aws lambda update-function-code --function-name algo-trade-trade-us-prod --zip-file fileb://lambda-deployment.zip
          aws lambda update-function-code --function-name algo-trade-trade-cn-prod --zip-file fileb://lambda-deployment.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment
          path: lambda-deployment.zip
          retention-days: 5
